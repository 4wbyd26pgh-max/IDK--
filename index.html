<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dry Soil — SoilLife</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --green:    #1e5c2e;
  --green-lt: #e8f5ee;
  --green-btn:#d4ead9;
  --gold-lt:  #fef6e0;
  --blue-lt:  #eaf0f8;
  --white:    #ffffff;
  --ink:      #1a1a1a;
  --mid:      #555;
  --border:   #e8e2da;
  --sand:     #faf8f4;
  --r:        16px;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--sand);
  color: var(--ink);
  max-width: 100%;
  margin: 0 auto;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TOP BAR ── */
.topbar {
  background: var(--white);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1.5px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.back-btn {
  display: flex; align-items: center; gap: 4px;
  background: none; border: none; cursor: pointer;
  font-family: 'Nunito', sans-serif;
}
.back-btn svg { width: 22px; height: 22px; stroke: var(--green); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.page-title {
  font-size: 1.3rem; font-weight: 900;
  color: var(--green);
}
.listen-btn {
  display: flex; align-items: center; gap: 7px;
  border: 2px solid var(--green);
  border-radius: 50px; padding: 8px 16px;
  background: var(--white); cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-size: 0.88rem; font-weight: 800;
  color: var(--green);
  transition: background 0.18s;
}
.listen-btn:hover { background: var(--green-lt); }
.listen-btn:active { transform: scale(0.96); }
.listen-btn svg { width: 18px; height: 18px; fill: var(--green); }

/* ── HERO PHOTO ── */
.hero-photo {
  width: 100%; height: 260px;
  background:
    linear-gradient(to bottom, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.55) 100%),
    url('https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=1200&q=85') center/cover no-repeat;
  display: flex; align-items: flex-end;
  padding: 28px 24px;
}
.hero-caption {
  font-size: 1.55rem; font-weight: 900;
  color: var(--white); line-height: 1.2;
  max-width: 260px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
}

/* ── SECTION LABEL ── */
.section-label {
  display: flex; align-items: center; gap: 8px;
  padding: 20px 18px 14px;
  font-size: 1rem; font-weight: 900; color: var(--ink);
}
.section-label svg { width: 22px; height: 22px; }

/* ── SOLUTION CARDS ── */
.sol-list { margin-left: auto;
           margin-right: auto;
           max-width:960px;
  display: flex; flex-direction: column;
  gap: 14px; padding: 0 14px 32px;
}
.sol-card {
  background: var(--white);
  border-radius: var(--r);
  padding: 18px 16px 16px;
  box-shadow: 0 2px 14px rgba(0,0,0,0.07);
  border: 1.5px solid var(--border);
}

/* Top row: number + title/desc + photo */
.sol-top {
  display: flex; gap: 12px;
  margin-bottom: 14px;
}
.sol-left { flex: 1; display: flex; gap: 12px; }
.sol-num {
  width: 36px; height: 36px; flex-shrink: 0;
  background: var(--green); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 0.95rem; font-weight: 900;
}
.sol-text {}
.sol-name {
  font-size: 1.05rem; font-weight: 900;
  color: var(--ink); line-height: 1.2;
  margin-bottom: 4px;
}
.sol-desc {
  font-size: 0.82rem; color: var(--mid);
  font-weight: 600; line-height: 1.45;
}
.sol-photo {
  width: 110px; height: 90px; flex-shrink: 0;
  border-radius: 12px; object-fit: cover;
  background: #ccc; overflow: hidden;
}
.sol-photo div {
  width: 100%; height: 100%;
  background-size: cover; background-position: center;
  border-radius: 12px;
}
.sp1 { background-image: url('https://unsplash.com/photos/green-leaf-on-brown-soil-iB1JuJyQob4'); }
.sp2 { background-image: url('https://images.unsplash.com/photo-1542601906897-eef67d97a38f?w=300&q=80'); }
.sp3 { background-image: url('https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=300&q=80'); }

/* Action buttons row */
.sol-actions {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.sol-btn {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; border-radius: 12px; padding: 10px 6px;
  font-size: 0.82rem; font-weight: 800;
  cursor: pointer; border: none;
  font-family: 'Nunito', sans-serif;
  transition: opacity 0.15s, transform 0.15s;
}
.sol-btn:active { transform: scale(0.95); opacity: 0.85; }
.sol-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

.btn-watch {
  background: var(--green-btn);
  color: var(--green);
}
.btn-watch svg { fill: var(--green); }

.btn-listen {
  background: var(--gold-lt);
  color: #7a5800;
}
.btn-listen svg { fill: none; stroke: #7a5800; stroke-width: 2; }

.btn-photos {
  background: var(--blue-lt);
  color: #2a4a7a;
}
.btn-photos svg { fill: none; stroke: #2a4a7a; stroke-width: 2; }

/* ── PAGE WRAPPER ── */
.page-wrap {
  max-width: 680px;
  margin: 0 auto;
}

/* ── PAGE END PAD ── */
.page-end { height: 32px; }

/* ── RESPONSIVE ── */
@media (min-width: 768px) {
  .topbar { padding: 16px 40px; }
  .hero-photo { height: 340px; padding: 36px 40px; }
  .hero-caption { font-size: 2rem; max-width: 420px; }
  .section-label { padding: 24px 40px 16px; font-size: 1.1rem; }
  .sol-list { padding: 0 40px 40px; gap: 18px; }
  .sol-name { font-size: 1.15rem; }
  .sol-desc { font-size: 0.9rem; }
  .sol-photo { width: 130px; height: 110px; }
}

@media (min-width: 1100px) {
  .topbar { padding: 18px 80px; }
  .hero-photo { height: 420px; padding: 44px 80px; }
  .hero-caption { font-size: 2.4rem; max-width: 560px; }
  .section-label { padding: 32px 80px 20px; font-size: 1.2rem; }
  .sol-list {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
    padding: 0 20px 80px;
  }
  .sol-photo { width: 100%; height: 140px; flex-shrink: unset; }
  .sol-top { flex-direction: column; }
  .sol-left { flex-direction: row; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="back-btn">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="page-title">Dry Soil</div>
  <button class="listen-btn">
    <!-- Speaker icon -->
    <svg viewBox="0 0 24 24">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="var(--green)" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="var(--green)" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
    Listen
  </button>
</div>

<!-- HERO PHOTO -->
<div class="hero-photo">
  <div class="hero-caption">Your soil may be losing water too quickly.</div>
</div>

<!-- SECTION LABEL -->
<div class="page-wrap">
<div class="section-label">
  <!-- Leaf icon -->
  <svg viewBox="0 0 24 24" fill="var(--green)">
    <path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 0 0 8 20C19 20 22 3 22 3c-1 2-8 1-16 7"/>
  </svg>
  3 simple ways to fix dry soil
</div>

<!-- SOLUTION CARDS -->
<div class="sol-list">

  <!-- Card 1: Add Mulch -->
  <div class="sol-card">
    <div class="sol-top">
      <div class="sol-left">
        <div class="sol-num">1</div>
        <div class="sol-text">
          <div class="sol-name">Add Mulch</div>
          <div class="sol-desc">Cover soil with dry leaves,<br>straw, or grass.</div>
        </div>
      </div>
      <div class="sol-photo"><div class="sp1"></div></div>
    </div>
    <div class="sol-actions">
      <button class="sol-btn btn-watch">
        <!-- Play icon -->
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Watch
      </button>
      <button class="sol-btn btn-listen">
        <!-- Headphones icon -->
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
          <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
          <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
        </svg>
        Listen
      </button>
      <button class="sol-btn btn-photos">
        <!-- Image icon -->
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        See photos
      </button>
    </div>
  </div>

  <!-- Card 2: Plant Shade Trees -->
  <div class="sol-card">
    <div class="sol-top">
      <div class="sol-left">
        <div class="sol-num">2</div>
        <div class="sol-text">
          <div class="sol-name">Plant Shade Trees</div>
          <div class="sol-desc">Trees protect soil from<br>sun and wind.</div>
        </div>
      </div>
      <div class="sol-photo"><div class="sp2"></div></div>
    </div>
    <div class="sol-actions">
      <button class="sol-btn btn-watch">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Watch
      </button>
      <button class="sol-btn btn-listen">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
          <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
          <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
        </svg>
        Listen
      </button>
      <button class="sol-btn btn-photos">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        See photos
      </button>
    </div>
  </div>

  <!-- Card 3: Collect Rainwater -->
  <div class="sol-card">
    <div class="sol-top">
      <div class="sol-left">
        <div class="sol-num">3</div>
        <div class="sol-text">
          <div class="sol-name">Collect Rainwater</div>
          <div class="sol-desc">Store rainwater to use<br>during dry days.</div>
        </div>
      </div>
      <div class="sol-photo"><div class="sp3"></div></div>
    </div>
    <div class="sol-actions">
      <button class="sol-btn btn-watch">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Watch
      </button>
      <button class="sol-btn btn-listen">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
          <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
          <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
        </svg>
        Listen
      </button>
      <button class="sol-btn btn-photos">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        See photos
      </button>
    </div>
  </div>

</div><!-- end sol-list -->
</div><!-- end page-wrap -->

<div class="page-end"></div>

<script>
// Back button
document.querySelector('.back-btn').addEventListener('click', () => {
  window.history.back();
});

// Listen button feedback
document.querySelector('.listen-btn').addEventListener('click', function () {
  const orig = this.innerHTML;
  this.style.background = 'var(--green)';
  this.style.color = 'white';
  this.querySelector('polygon').style.fill = 'white';
  setTimeout(() => {
    this.style.background = '';
    this.style.color = '';
    this.querySelector('polygon').style.fill = '';
  }, 2000);
});

// Action button feedback
document.querySelectorAll('.sol-btn').forEach(btn => {
  btn.addEventListener('click', function () {
    const orig = this.style.opacity;
    this.style.transform = 'scale(0.94)';
    setTimeout(() => this.style.transform = '', 150);
  });
});
</script>
</body>
</html>
