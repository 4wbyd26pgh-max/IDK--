<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dry Soil — Name</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
 --green:     #1e5c2e;
 --green-lt:  #e8f5ee;
 --green-btn: #d4ead9;
 --gold-lt:   #fef6e0;
 --blue-lt:   #eaf0f8;
 --white:     #ffffff;
 --ink:       #1a1a1a;
 --mid:       #555;
 --border:    #e8e2da;
 --sand:      #faf8f4;
 --r:         16px;
}
html { scroll-behavior: smooth; }
body {
 font-family: 'Nunito', sans-serif;
 background: var(--sand);
 color: var(--ink);
 overflow-x: hidden;
}
/* ━━ TOP BAR ━━ */
.topbar {
 background: var(--white);
 border-bottom: 1.5px solid var(--border);
 position: sticky; top: 0; z-index: 50;
 display: flex; align-items: center; justify-content: space-between;
 padding: 14px 20px;
}
.back-btn {
 display: flex; align-items: center;
 background: none; border: none; cursor: pointer; padding: 4px;
}
.back-btn svg {
 width: 24px; height: 24px;
 stroke: var(--green); stroke-width: 2.5;
 fill: none; stroke-linecap: round; stroke-linejoin: round;
}
.page-title { font-size: 1.2rem; font-weight: 900; color: var(--green); }
.listen-btn {
 display: flex; align-items: center; gap: 7px;
 border: 2px solid var(--green); border-radius: 50px;
 padding: 8px 16px; background: var(--white); cursor: pointer;
 font-family: 'Nunito', sans-serif;
 font-size: 0.85rem; font-weight: 800; color: var(--green);
 transition: background 0.18s;
}
.listen-btn:hover { background: var(--green-lt); }
.listen-btn svg {
 width: 18px; height: 18px;
 fill: none; stroke: var(--green); stroke-width: 2; stroke-linecap: round;
}
/* ━━ HERO PHOTO ━━ */
.hero-photo {
 width: 100%; height: 260px;
 background:
   linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.6) 100%),
   url('https://images.unsplash.com/photo-1582288916603-4698cf723bf6?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover no-repeat;
 display: flex; align-items: flex-end;
 padding: 24px 20px;
}
.hero-caption {
 font-size: 1.55rem; font-weight: 900;
 color: white; line-height: 1.2; max-width: 300px;
 text-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
/* ━━ CONTENT WRAPPER ━━ */
.content {
 max-width: 960px;
 margin: 0 auto;
 padding: 24px 16px 40px;
}
/* ━━ SOLUTION CARDS ━━ */
.sol-list {
 display: flex; flex-direction: column; gap: 16px;
}
.sol-card {
 background: var(--white);
 border-radius: var(--r);
 padding: 18px 16px 16px;
 box-shadow: 0 2px 14px rgba(0,0,0,0.07);
 border: 1.5px solid var(--border);
}
.sol-top {
 display: flex; gap: 12px; margin-bottom: 14px;
}
.sol-left { flex: 1; display: flex; gap: 12px; }
.sol-num {
 width: 36px; height: 36px; flex-shrink: 0;
 background: var(--green); border-radius: 50%;
 display: flex; align-items: center; justify-content: center;
 color: white; font-size: 0.95rem; font-weight: 900;
}
.sol-name { font-size: 1.05rem; font-weight: 900; color: var(--ink); margin-bottom: 4px; }
.sol-desc { font-size: 0.82rem; color: var(--mid); font-weight: 600; line-height: 1.45; }
.sol-photo {
 width: 110px; height: 90px; flex-shrink: 0;
 border-radius: 12px;
 background-size: cover; background-position: center;
}
.sp1 { background-image: url('https://swanhose.com/cdn/shop/articles/Using_Mulch_in_a_Vegetable_Garden_1000x.jpg?v=1648139181'); }
.sp2 { background-image: url('https://images.unsplash.com/photo-1476231682828-37e571bc172f?w=300&q=80'); }
.sp3 { background-image: url('https://www.bootstrapfarmer.com/cdn/shop/articles/RainwaterCollection_1_1800x.jpg?v=1702922308'); }
.sol-actions {
 display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.sol-btn {
 display: flex; align-items: center; justify-content: center; gap: 6px;
 border-radius: 12px; padding: 10px 6px;
 font-size: 0.82rem; font-weight: 800;
 cursor: pointer; border: none;
 font-family: 'Nunito', sans-serif;
 transition: opacity 0.15s, transform 0.15s;
}
.sol-btn:active { transform: scale(0.95); }
.sol-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
.btn-watch  { background: var(--green-btn); color: var(--green); }
.btn-watch svg { fill: var(--green); }
.btn-listen { background: var(--gold-lt); color: #7a5800; }
.btn-listen svg { fill: none; stroke: #7a5800; stroke-width: 2; }
.btn-photos { background: var(--blue-lt); color: #2a4a7a; }
.btn-photos svg { fill: none; stroke: #2a4a7a; stroke-width: 2; }
/* ━━ RESPONSIVE ━━ */
@media (min-width: 768px) {
 .topbar { padding: 16px 40px; }
 .hero-photo { height: 320px; padding: 32px 40px; }
 .hero-caption { font-size: 2rem; max-width: 480px; }
 .content { padding: 32px 40px 60px; }
 .sol-photo { width: 130px; height: 110px; }
}
@media (min-width: 1100px) {
 .topbar { padding: 18px 80px; }
 .hero-photo { height: 400px; padding: 44px 80px; }
 .hero-caption { font-size: 2.5rem; max-width: 600px; }
 .content { padding: 40px 80px 80px; }
 .sol-list {
   display: grid;
   grid-template-columns: repeat(3, 1fr);
   gap: 20px;
 }
 .sol-photo { width: 100%; height: 130px; flex-shrink: unset; }
 .sol-top { flex-direction: column; }
}
</style>
</head>
<body>
<!-- TOP BAR -->
<div class="topbar">
<button class="back-btn" onclick="window.location='index.html'">
<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
</button>
<div class="page-title">Dry Soil</div>
<button class="listen-btn">
<svg viewBox="0 0 24 24">
<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="var(--green)" stroke="none"/>
<path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
<path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
</svg>
   Listen
</button>
</div>
<!-- HERO PHOTO -->
<div class="hero-photo">
<div class="hero-caption">Your soil may be losing water too quickly.</div>
</div>
<!-- CONTENT -->
<div class="content">
<div class="sol-list">
<!-- Card 1 -->
<div class="sol-card">
<div class="sol-top">
<div class="sol-left">
<div class="sol-num">1</div>
<div>
<div class="sol-name">Add Mulch</div>
<div class="sol-desc">Cover soil with dry leaves, straw, or grass.</div>
</div>
</div>
<div class="sol-photo sp1"></div>
</div>
<div class="sol-actions">
<button class="sol-btn btn-watch">
<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>Watch
</button>
<button class="sol-btn btn-listen">
<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
<path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
<path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
<path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
</svg>Listen
</button>
<button class="sol-btn btn-photos">
<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
<rect x="3" y="3" width="18" height="18" rx="2"/>
<circle cx="8.5" cy="8.5" r="1.5"/>
<polyline points="21 15 16 10 5 21"/>
</svg>See photos
</button>
</div>
</div>
<!-- Card 2 -->
<div class="sol-card">
<div class="sol-top">
<div class="sol-left">
<div class="sol-num">2</div>
<div>
<div class="sol-name">Plant Shade Trees</div>
<div class="sol-desc">Trees protect soil from sun and wind.</div>
</div>
</div>
<div class="sol-photo sp2"></div>
</div>
<div class="sol-actions">
<button class="sol-btn btn-watch">
<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>Watch
</button>
<button class="sol-btn btn-listen">
<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
<path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
<path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
<path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
</svg>Listen
</button>
<button class="sol-btn btn-photos">
<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
<rect x="3" y="3" width="18" height="18" rx="2"/>
<circle cx="8.5" cy="8.5" r="1.5"/>
<polyline points="21 15 16 10 5 21"/>
</svg>See photos
</button>
</div>
</div>
<!-- Card 3 -->
<div class="sol-card">
<div class="sol-top">
<div class="sol-left">
<div class="sol-num">3</div>
<div>
<div class="sol-name">Collect Rainwater</div>
<div class="sol-desc">Store rainwater to use during dry days.</div>
</div>
</div>
<div class="sol-photo sp3"></div>
</div>
<div class="sol-actions">
<button class="sol-btn btn-watch">
<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>Watch
</button>
<button class="sol-btn btn-listen">
<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
<path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
<path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
<path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
</svg>Listen
</button>
<button class="sol-btn btn-photos">
<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
<rect x="3" y="3" width="18" height="18" rx="2"/>
<circle cx="8.5" cy="8.5" r="1.5"/>
<polyline points="21 15 16 10 5 21"/>
</svg>See photos
</button>
</div>
</div>
</div>
</div>
<script>
document.querySelector('.listen-btn').addEventListener('click', function () {
 this.style.background = 'var(--green)';
 this.style.color = 'white';
 setTimeout(() => { this.style.background = ''; this.style.color = ''; }, 2000);
});
</script>
</body>
</html>
